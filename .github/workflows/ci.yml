name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install "platformio==6.1.19" ".\pc_server[speech,firmware,test]"
      - run: python -m compileall -q pc_server/src tools
      - run: python -m pytest -q
      - run: pio run -d firmware
