[platformio]
default_envs = m5stack-stickc-plus2

[env:m5stack-stickc-plus2]
platform = espressif32@6.7.0
board = m5stick-c
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
board_build.flash_size = 8MB
board_build.partitions = huge_app.csv
board_upload.maximum_size = 8388608
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=3
extra_scripts = pre:scripts/version.py
lib_deps =
    https://github.com/m5stack/M5GFX.git#0.2.15
    https://github.com/m5stack/M5Unified.git#0.2.10
    https://github.com/Links2004/arduinoWebSockets.git#2.6.1
    https://github.com/bblanchon/ArduinoJson.git#v7.4.2
